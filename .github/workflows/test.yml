name: Node.js CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install

    - name: Run Tests
      run: npm test
      env:
        # Aquí ponemos variables ficticias para que los tests no exploten
        JWT_SECRET_ACCESS: test_secret_access
        JWT_SECRET_REFRESH: test_secret_refresh
        NODE_ENV: test