name: Node.js CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install

      - name: Run Tests
        # Creamos un .env vacío para que el comando --env-file=.env no falle
        # Luego ejecutamos los tests pasando las variables necesarias
        run: |
          touch .env
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET_ACCESS: test_secret_access
          JWT_SECRET_REFRESH: test_secret_refresh
          DATABASE_URL: mongodb://localhost:27017/test